# When the pod network is set to be advertised, there is no longer a need to
# SNAT pod IPs for this network to the node IP. Therefore, when pod network
# advertisements are enabled, the traffic from these pods will no longer be
# SNAT'ed on egress.
# Source: https://github.com/openshift/enhancements/blob/master/enhancements/network/bgp-ovn-kubernetes.md
apiVersion: k8s.ovn.org/v1
kind: RouteAdvertisements
metadata:
  name: udn-example-layer2
spec:
  advertisements:
  - PodNetwork
  # EgressIP advertisement is currently not supported for Layer2 networks
  #- EgressIP
  frrConfigurationSelector:
    matchLabels:
      advertise: udn-example-layer2
  networkSelectors:
  - clusterUserDefinedNetworkSelector:
      networkSelector:
        matchLabels:
          advertise: udn-example-layer2
    networkSelectionType: ClusterUserDefinedNetworks
  nodeSelector: {}
