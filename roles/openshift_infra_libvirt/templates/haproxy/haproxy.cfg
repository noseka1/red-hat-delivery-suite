global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
#	stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
  ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
  ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
  ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
  timeout connect 5000
#  timeout client  50000
#  timeout server  50000
  timeout client 7d
  timeout server 7d

frontend stats
    bind *:1936
    mode http
    stats enable
    stats hide-version
    stats refresh 5s
    stats show-node
    stats show-desc Stats for OpenShift cluster
    stats uri /

frontend stats2
   bind *:1937
#   option http-use-htx
   http-request use-service prometheus-exporter if { path /metrics }
   stats enable
   stats hide-version
   stats refresh 5s
   stats show-node
   stats show-desc Stats for 192.168.10.1
   stats uri /stats

frontend openshift_ironic
    bind *:6385
    mode tcp
    option tcplog
    default_backend openshift_ironic

backend openshift_ironic
    balance roundrobin
    mode tcp
{% for i in range(1, osinfralibvirt_cluster_bootstrap_count + 1) %}
    server b{{ i }}{{ osinfralibvirt_cluster_name }} 192.168.{{ osinfralibvirt_lab_number }}0.{{ 19 + i }}:6385 check inter 1s backup
{% endfor %}
{% for i in range(1, osinfralibvirt_cluster_master_count + 1) %}
    server m{{ i }}{{ osinfralibvirt_cluster_name }} 192.168.{{ osinfralibvirt_lab_number }}0.{{ 20 + i }}:6385 check inter 1s
{% endfor %}

