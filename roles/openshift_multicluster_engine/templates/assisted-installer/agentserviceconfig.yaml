apiVersion: agent-install.openshift.io/v1beta1
kind: AgentServiceConfig
metadata:
#  annotations:
#    # Fix Unable to fetch `assisted-installer-agent` image due to a signature
#    # verification failure: Source image rejected: A signature was required,
#    # but no signature exists.
#    # The issue is observed in disconnected environments wherein the images in
#    # the mirror registry are not signed.
#    # Link: https://access.redhat.com/solutions/7131683
#    unsupported.agent-install.openshift.io/assisted-service-allow-unrestricted-image-pulls: 'true'
  name: agent
spec:
  # For the volume sizing refer to:
  # https://access.redhat.com/documentation/en-us/red_hat_advanced_cluster_management_for_kubernetes/2.7/html-single/clusters/index#enable-cim
  databaseStorage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  filesystemStorage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 100Gi
  imageStorage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 50Gi
{% if mce_os_image_trusted_ca | length > 0 %}
  OSImageCACertRef:
    name: assisted-image-service-trusted-ca
{% endif %}
  osImages: {{ mce_os_images | to_json }}
